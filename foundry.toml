[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"

solc_version = "0.8.24"

optimizer = true
optimizer_runs = 200

ffi = true
fs_permissions = [{ access = "read-write", path = "./" }]

remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "@uniswap/v2-core/=lib/v2-core/",
    "@uniswap/v2-periphery/=lib/v2-periphery/",
    "forge-std/=lib/forge-std/src/"
]
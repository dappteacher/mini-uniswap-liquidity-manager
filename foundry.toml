[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"

solc_version = "0.8.24"

[fuzz]
runs = 2000

[invariant]
runs = 500
depth = 50
fail_on_revert = true

optimizer = true
optimizer_runs = 200

ffi = true
fs_permissions = [{ access = "read-write", path = "./" }]

remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "forge-std/=lib/forge-std/src/"
]